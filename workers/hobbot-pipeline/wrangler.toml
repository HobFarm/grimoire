name = "hobbot-pipeline"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */6 * * *", "0 5 * * *", "0 8 * * *"]

[[d1_databases]]
binding = "GRIMOIRE_DB"
database_name = "grimoire-db"
database_id = "3cb1cdee-17af-477c-ab0a-5a18447948ef"

[[d1_databases]]
binding = "HOBBOT_DB"
database_name = "hobbot-db"
database_id = "d91a32f8-670b-46a3-9008-f16224b2f8d7"

[[r2_buckets]]
binding = "R2"
bucket_name = "hobfarm-cdn"
preview_bucket_name = "hobfarm-cdn-preview"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "PROVIDER_HEALTH"
id = "30a7b9ccfd82493b9c96fbe994b40bbe"
preview_id = "85429dee6bca4fb58ad8e032510cc7b0"

[[services]]
binding = "GRIMOIRE"
service = "grimoire"

[vars]
ENVIRONMENT = "development"
STYLEFUSION_URL = "https://sf.hob.farm"
SELF_URL = "https://hobbot-pipeline.damp-violet-bf89.workers.dev"
INTERNAL_SECRET = "enrich-chain-2026"

[[secrets_store_secrets]]
binding = "GEMINI_API_KEY"
store_id = "e1efb254fa9e40359b0b3bdeab02b082"
secret_name = "gemini-api-key"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
