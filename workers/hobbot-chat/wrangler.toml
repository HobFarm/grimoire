name = "hobbot-chat"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "GRIMOIRE_DB"
database_name = "grimoire-db"
database_id = "3cb1cdee-17af-477c-ab0a-5a18447948ef"

[[d1_databases]]
binding = "HOBBOT_DB"
database_name = "hobbot-db"
database_id = "d91a32f8-670b-46a3-9008-f16224b2f8d7"

[[secrets_store_secrets]]
binding = "ANTHROPIC_API_KEY"
store_id = "e1efb254fa9e40359b0b3bdeab02b082"
secret_name = "anthropic-api-key"

[[secrets_store_secrets]]
binding = "AI_GATEWAY_TOKEN"
store_id = "e1efb254fa9e40359b0b3bdeab02b082"
secret_name = "ai-gateway-token"

[[secrets_store_secrets]]
binding = "DASHSCOPE_API_KEY"
store_id = "e1efb254fa9e40359b0b3bdeab02b082"
secret_name = "dashscope-api-key"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "PROVIDER_HEALTH"
id = "30a7b9ccfd82493b9c96fbe994b40bbe"
preview_id = "85429dee6bca4fb58ad8e032510cc7b0"

[[ratelimits]]
name = "MESSAGE_RATE_LIMIT"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "SESSION_RATE_LIMIT"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 5
  period = 60

[triggers]
crons = ["0 4 * * *"]

[vars]
ENVIRONMENT = "production"
AI_GATEWAY_ACCOUNT_ID = "e343cbfa70c5166f00d871e513ae352a"
AI_GATEWAY_NAME = "hobfarm"

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
